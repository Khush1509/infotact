# docker-compose.yml — Infotact Full Ecosystem

# ─────────────────────────────────────────────────────────────────
#  Infotact – Full Ecosystem Docker Compose
#  Services:  zookeeper | kafka | db | api | consumer
#  Run:       docker compose up --build
# ─────────────────────────────────────────────────────────────────

services:

  # ── 1. Zookeeper (Kafka dependency) ────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  # ── 2. Apache Kafka broker ─────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    restart: unless-stopped

  # ── 3. PostgreSQL database ─────────────────────────────────────
  db:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: infotact
      POSTGRES_PASSWORD: infotactpwd
      POSTGRES_DB: infotactdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # ── 4. Flask API + background transcoding worker ───────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask_api
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      UPLOAD_FOLDER: /app/storage
      FLASK_ENV: ${FLASK_ENV:-development}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DATABASE_URL: postgresql://infotact:infotactpwd@db:5432/infotactdb
    volumes:
      - storage_data:/app/storage
    depends_on:
      - kafka
      - db
    restart: unless-stopped

  # ── 5. Analytics Kafka consumer daemon ─────────────────────────
  consumer:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    container_name: analytics_consumer
    environment:
      KAFKA_BROKERS: kafka:9092
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: infotactdb
      DB_USER: infotact
      DB_PASSWORD: infotactpwd
    depends_on:
      - kafka
      - db
    restart: unless-stopped

# ─── Named volumes ─────────────────────────────────────────────────
volumes:
  db_data:
  storage_data:

# ─── Network ───────────────────────────────────────────────────────
networks:
  default:
    driver: bridge

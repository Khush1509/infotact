version: '3.8'

services:
  db:
    image: postgres:15
    container_name: legaltech_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-legaltech_db}
      POSTGRES_USER: ${DB_USER:-legaltech_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-legaltech_pass}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    container_name: legaltech_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
